name: Build Android APKs (TWA)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ej: 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@latest

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>/dev/null | tail -3

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass tumarca2024 -keypass tumarca2024 \
            -dname "CN=TuMarca, OU=Dev, O=TuMarca, L=Caracas, S=Miranda, C=VE"
          keytool -list -v -keystore android.keystore -alias android -storepass tumarca2024 2>/dev/null \
            | grep "SHA256:" | awk '{print $2}' > fingerprint.txt
          echo "=== Fingerprint SHA256 ==="
          cat fingerprint.txt

      - name: Build Customer APK
        run: |
          cd twa-customer
          echo "--- Running bubblewrap init ---"
          bubblewrap init --skipPwaValidation 2>&1
          echo "--- Running bubblewrap build ---"
          bubblewrap build \
            --signingKeyStorePassword tumarca2024 \
            --signingKeyPassword tumarca2024 2>&1
          echo "--- Finding APK ---"
          find . -name "*.apk" 2>/dev/null

      - name: Build Driver APK
        run: |
          cd twa-driver
          echo "--- Running bubblewrap init ---"
          bubblewrap init --skipPwaValidation 2>&1
          echo "--- Running bubblewrap build ---"
          bubblewrap build \
            --signingKeyStorePassword tumarca2024 \
            --signingKeyPassword tumarca2024 2>&1
          echo "--- Finding APK ---"
          find . -name "*.apk" 2>/dev/null

      - name: Collect APKs
        run: |
          mkdir -p apks
          # Try multiple possible output paths from Bubblewrap
          for src in \
            "twa-customer/app-release-signed.apk" \
            "twa-customer/app/build/outputs/apk/release/app-release-signed.apk" \
            "twa-customer/app/build/outputs/apk/release/app-release.apk"; do
            [ -f "$src" ] && cp "$src" "apks/TuMarca-Cliente-${{ github.event.inputs.version }}.apk" && break
          done
          for src in \
            "twa-driver/app-release-signed.apk" \
            "twa-driver/app/build/outputs/apk/release/app-release-signed.apk" \
            "twa-driver/app/build/outputs/apk/release/app-release.apk"; do
            [ -f "$src" ] && cp "$src" "apks/TuMarca-Repartidor-${{ github.event.inputs.version }}.apk" && break
          done
          echo "=== APKs generados ==="
          ls -lh apks/ 2>/dev/null || echo "No se encontraron APKs"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tumarca-apks-${{ github.event.inputs.version }}
          path: |
            apks/
            fingerprint.txt
          retention-days: 30
