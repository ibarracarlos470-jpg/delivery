name: Build Android APKs (TWA)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ej: 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Android SDK components
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" "build-tools;34.0.0" "platforms;android-34" 2>/dev/null | tail -3 || true

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass tumarca2024 -keypass tumarca2024 \
            -dname "CN=TuMarca,OU=Dev,O=TuMarca,L=Caracas,S=Miranda,C=VE"
          keytool -list -v -keystore android.keystore -alias android \
            -storepass tumarca2024 2>/dev/null \
            | grep "SHA256:" | awk '{print $2}' > fingerprint.txt
          echo "Fingerprint: $(cat fingerprint.txt)"

      - name: Build Customer APK
        run: |
          cd twa-customer
          # "N" = do not overwrite existing twa-manifest.json, just generate Android project
          printf "N\n" | bubblewrap init --skipPwaValidation
          bubblewrap build \
            --signingKeyStorePassword tumarca2024 \
            --signingKeyPassword tumarca2024

      - name: Build Driver APK
        run: |
          cd twa-driver
          printf "N\n" | bubblewrap init --skipPwaValidation
          bubblewrap build \
            --signingKeyStorePassword tumarca2024 \
            --signingKeyPassword tumarca2024

      - name: Collect APKs
        run: |
          mkdir -p apks
          find twa-customer -name "*.apk" | head -1 | xargs -I{} cp {} "apks/TuMarca-Cliente-${{ github.event.inputs.version }}.apk" 2>/dev/null || true
          find twa-driver   -name "*.apk" | head -1 | xargs -I{} cp {} "apks/TuMarca-Repartidor-${{ github.event.inputs.version }}.apk" 2>/dev/null || true
          echo "=== APKs generados ==="
          ls -lh apks/ 2>/dev/null || echo "No se encontraron APKs"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tumarca-apks-${{ github.event.inputs.version }}
          path: |
            apks/
            fingerprint.txt
          retention-days: 30
