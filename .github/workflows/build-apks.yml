name: Build Android APKs (TWA)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ej: 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          ls /tmp/gradle-8.5/bin/
          echo "GRADLE=/tmp/gradle-8.5/bin/gradle" >> $GITHUB_ENV

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass tumarca2024 -keypass tumarca2024 \
            -dname "CN=TuMarca,OU=Dev,O=TuMarca,L=Caracas,S=Miranda,C=VE"
          keytool -list -v -keystore android.keystore -alias android \
            -storepass tumarca2024 2>/dev/null \
            | grep "SHA256:" | awk '{print $2}' > fingerprint.txt
          echo "Fingerprint: $(cat fingerprint.txt)"

      - name: Generate launcher icons (Python)
        run: |
          python3 << 'PYEOF'
          import struct, zlib, os

          def make_png(size, rgb):
              r, g, b = rgb
              def chunk(tag, data):
                  c = zlib.crc32(tag + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + tag + data + struct.pack('>I', c)
              row = bytes([0]) + bytes([r, g, b] * size)
              raw = b''.join(row for _ in range(size))
              ihdr = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
              return (b'\x89PNG\r\n\x1a\n'
                      + chunk(b'IHDR', ihdr)
                      + chunk(b'IDAT', zlib.compress(raw))
                      + chunk(b'IEND', b''))

          densities = [('mdpi',48),('hdpi',72),('xhdpi',96),('xxhdpi',144),('xxxhdpi',192)]
          green = (0, 135, 61)
          orange = (249, 115, 22)

          for density, size in densities:
              for app, color in [('android-customer', green), ('android-driver', orange)]:
                  d = f'{app}/app/src/main/res/mipmap-{density}'
                  os.makedirs(d, exist_ok=True)
                  data = make_png(size, color)
                  open(f'{d}/ic_launcher.png', 'wb').write(data)
                  open(f'{d}/ic_launcher_round.png', 'wb').write(data)

          print("Icons generated OK")
          PYEOF

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>/dev/null || true

      - name: Build Customer APK
        run: |
          cd android-customer
          $GRADLE assembleRelease --no-daemon
          find . -name "*.apk"

      - name: Build Driver APK
        run: |
          cd android-driver
          $GRADLE assembleRelease --no-daemon
          find . -name "*.apk"

      - name: Collect APKs
        run: |
          mkdir -p apks
          VERSION="${{ github.event.inputs.version }}"
          find android-customer -name "*.apk" | head -1 \
            | xargs -I{} cp {} "apks/TuMarca-Cliente-${VERSION}.apk" 2>/dev/null || true
          find android-driver -name "*.apk" | head -1 \
            | xargs -I{} cp {} "apks/TuMarca-Repartidor-${VERSION}.apk" 2>/dev/null || true
          ls -lh apks/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tumarca-apks-${{ github.event.inputs.version }}
          path: |
            apks/
            fingerprint.txt
          retention-days: 30
