name: Build Android APKs (TWA)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ej: 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass tumarca2024 -keypass tumarca2024 \
            -dname "CN=TuMarca,OU=Dev,O=TuMarca,L=Caracas,S=Miranda,C=VE"
          keytool -list -v -keystore android.keystore -alias android \
            -storepass tumarca2024 2>/dev/null \
            | grep "SHA256:" | awk '{print $2}' > fingerprint.txt
          echo "Fingerprint: $(cat fingerprint.txt)"

      - name: Generate launcher icons (ImageMagick)
        run: |
          # Customer icons — green
          for spec in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            density="${spec%%:*}"; size="${spec##*:}"
            dir="android-customer/app/src/main/res/mipmap-$density"
            mkdir -p "$dir"
            convert -size "${size}x${size}" xc:'#00873d' \
              -gravity center -fill white -font DejaVu-Sans-Bold \
              -pointsize "$((size * 35 / 100))" -annotate 0 "TM" \
              "$dir/ic_launcher.png"
            cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
          done
          # Driver icons — orange
          for spec in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            density="${spec%%:*}"; size="${spec##*:}"
            dir="android-driver/app/src/main/res/mipmap-$density"
            mkdir -p "$dir"
            convert -size "${size}x${size}" xc:'#f97316' \
              -gravity center -fill white -font DejaVu-Sans-Bold \
              -pointsize "$((size * 35 / 100))" -annotate 0 "TR" \
              "$dir/ic_launcher.png"
            cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
          done

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>/dev/null || true

      - name: Build Customer APK
        run: |
          cd android-customer
          gradle assembleRelease --no-daemon -q
          find . -name "*.apk" | head -5

      - name: Build Driver APK
        run: |
          cd android-driver
          gradle assembleRelease --no-daemon -q
          find . -name "*.apk" | head -5

      - name: Collect APKs
        run: |
          mkdir -p apks
          VERSION="${{ github.event.inputs.version }}"
          find android-customer -name "*.apk" | head -1 \
            | xargs -I{} cp {} "apks/TuMarca-Cliente-${VERSION}.apk" 2>/dev/null || true
          find android-driver -name "*.apk" | head -1 \
            | xargs -I{} cp {} "apks/TuMarca-Repartidor-${VERSION}.apk" 2>/dev/null || true
          echo "=== APKs ==="
          ls -lh apks/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tumarca-apks-${{ github.event.inputs.version }}
          path: |
            apks/
            fingerprint.txt
          retention-days: 30
